name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses and install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Install web dependencies
        run: npm ci

      - name: Install Capacitor toolchain
        run: npm install @capacitor/cli@^7 @capacitor/core@^7 @capacitor/android@^7

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Android platform
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Publish APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-${GITHUB_RUN_NUMBER}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" android/app/build/outputs/apk/debug/app-debug.apk --clobber
          else
            gh release create "$TAG" android/app/build/outputs/apk/debug/app-debug.apk \
              --title "CieloObs APK ${GITHUB_RUN_NUMBER}" \
              --notes "APK debug generado automaticamente desde GitHub Actions."
          fi

          gh api repos/${{ github.repository }}/releases/tags/$TAG \
            --jq '.assets[] | select(.name == "app-debug.apk") | .browser_download_url' \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cieloobs-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error